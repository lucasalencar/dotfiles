approval_policy = "on-request"
sandbox_mode    = "workspace-write"
approvals_reviewer = "auto_review"
plan_mode_reasoning_effort = "high"

[tui]
notifications = false
status_line = ["model-with-reasoning", "context-remaining", "total-input-tokens", "total-output-tokens", "current-dir", "git-branch", "pull-request-number", "branch-changes"]
status_line_use_colors = true

[tui.keymap.editor]
insert_newline = ["ctrl-j", "shift-enter", "alt-enter"]

[mcp_servers.atlassian]
url = "https://mcp.atlassian.com/v1/mcp"

[mcp_servers.tmux]
command = "npx"
args = ["-y", "--registry=https://registry.npmjs.org/", "tmux-mcp", "--shell-type=zsh"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

